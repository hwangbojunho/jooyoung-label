<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header class="site-header" th:fragment="header(activePage)">
    <div class="container">
        <a class="logo" th:href="@{/}" th:text="${siteName}">OO어패럴</a>
        <nav>
            <ul class="nav-links">
                <li><a th:href="@{/}" th:classappend="${activePage == 'home'} ? 'active'">홈</a></li>
                <li><a th:href="@{/about}" th:classappend="${activePage == 'about'} ? 'active'">소개</a></li>
                <li><a th:href="@{/products}" th:classappend="${activePage == 'products'} ? 'active'">작업물</a></li>
                <li><a th:href="@{/contact}" th:classappend="${activePage == 'contact'} ? 'active'">연락처</a></li>
            </ul>
        </nav>
    </div>
</header>

<footer class="site-footer" th:fragment="footer">
    <div class="container">
        <p th:text="${siteName} + ' © 2026. All rights reserved.'">OO어패럴 © 2026. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
